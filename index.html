<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>my-3d-app</title>
  </head>
  <body>
    <div id="app"></div>
    <div id="controls">
      <label for="metalness">Metalness <span id="metalness-value"></span></label>
      <input id="metalness" type="range" min="0" max="1" step="0.01" />
      <label for="roughness">Roughness <span id="roughness-value"></span></label>
      <input id="roughness" type="range" min="0" max="1" step="0.01" />
      <label for="color">Color</label>
      <input id="color" type="color" />
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
